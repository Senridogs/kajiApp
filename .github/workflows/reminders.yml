name: Chore Reminders

on:
  schedule:
    # JST 06:00 (UTC 21:00 前日)
    - cron: "0 21 * * *"
    # JST 20:00 (UTC 11:00)
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call reminder endpoint
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/reminders"
